name: SmartFin CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      # Enforce iteration-doc process: module code changes must have doc updates.
      - name: Validate iteration docs
        shell: pwsh
        run: |
          ./scripts/validate_iteration_docs.ps1

      # Fast fail gate.
      - name: Run smoke test
        run: python -m pytest -q tests/test_smoke.py

      # Module coverage gate for A/B/C/D.
      - name: Run module tests
        run: |
          python -m pytest -q \
            tests/test_ingest_index.py \
            tests/test_retrieval_hybrid.py \
            tests/test_qa_grounded.py \
            tests/test_report_writer.py \
            tests/test_container_config.py \
            tests/test_report_cli_encoding.py

      # Delivery-level CLI validation.
      - name: Run CLI smoke flow
        run: |
          python -m finqa ingest --data-dir data --out-dir .finqa_ci
          python -m finqa ask --q "Apple revenue" --out json
          python -m finqa report --mode cross_year --out json > .finqa_ci/report.json

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: finqa-ci-linux
          path: .finqa_ci
          if-no-files-found: error

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      # Keep a Windows-specific gate for encoding/path behavior.
      - name: Run smoke + report encoding tests
        run: |
          python -m pytest -q tests/test_smoke.py tests/test_report_cli_encoding.py

      - name: Run report CLI check
        run: |
          python -m finqa ingest --data-dir data --out-dir .finqa_ci
          python -m finqa report --mode cross_year --out json > .finqa_ci/report_windows.json

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: finqa-ci-windows
          path: .finqa_ci
          if-no-files-found: error

  docker-main:
    name: Docker Acceptance (main / manual)
    runs-on: ubuntu-latest
    needs: [test-linux]
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Quick config check before build.
      - name: Validate compose config
        run: docker compose config

      # Runtime acceptance gate for delivery.
      - name: Build and run container
        run: docker compose up --build -d

      - name: Verify smartfin container is running
        run: |
          docker ps --filter "name=smartfin"
          docker logs smartfin --tail 100

      - name: Collect container report artifact
        run: |
          test -f .finqa/report.json
          ls -la .finqa

      - name: Upload container artifacts
        uses: actions/upload-artifact@v4
        with:
          name: finqa-ci-docker
          path: .finqa
          if-no-files-found: error

      - name: Cleanup docker compose
        if: always()
        run: docker compose down -v
