services:
  finqa:
    build: .
    container_name: smartfin
    env_file:
      - .env.example
    environment:
      FINQA_ENABLE_LLM: ${FINQA_ENABLE_LLM:-0}
      FINQA_LLM_PROVIDER: ${FINQA_LLM_PROVIDER:-modelscope_local}
      FINQA_LLM_MODEL: ${FINQA_LLM_MODEL:-models/Qwen2___5-0___5B-Instruct}
      FINQA_LLM_LOCAL_FILES_ONLY: ${FINQA_LLM_LOCAL_FILES_ONLY:-true}
      FINQA_EMBEDDING_PROVIDER: ${FINQA_EMBEDDING_PROVIDER:-bge}
    volumes:
      - ./data:/app/data
      - ./.finqa:/app/.finqa
      - ./models:/app/models
    command:
      [
        "sh",
        "-c",
        "finqa ingest --data-dir /app/data --out-dir /app/.finqa && finqa report --mode cross_year --out json > /app/.finqa/report.json && cat /app/.finqa/report.json && tail -f /dev/null"
      ]
